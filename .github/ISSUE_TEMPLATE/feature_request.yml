name: Feature request
description: Suggest a new tool or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the Salesforce task you want to accomplish that isn't possible or is awkward today.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: A new tool, a new parameter on an existing tool, or a behavior change.
    validations:
      required: true
